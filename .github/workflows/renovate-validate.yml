name: Renovate Config Validation

on:
  push:
    paths:
      - 'renovate.json'
      - '.github/workflows/renovate-validate.yml'
  pull_request:
    paths:
      - 'renovate.json'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate Renovate Config
        uses: renovatebot/github-action@v41.0.14
        with:
          command: config-validator
          token: ${{ secrets.GITHUB_TOKEN }}
