---
name: Lint YAML
permissions:
  contents: read

"on":
  push:
    branches:
      - "main"
    paths:
      - "**/*.yaml"
  pull_request:
    paths:
      - "**/*.yaml"
  workflow_dispatch:

jobs:
  yaml-lint:
    name: YAML
    runs-on: ubuntu-latest
    container: python:3.14-slim@sha256:fb83750094b46fd6b8adaa80f66e2302ecbe45d513f6cece637a841e1025b4ca
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          version: "0.11.2"

      - name: Install the project
        run: uv sync --locked --all-extras --dev

      - name: Run yamllint
        run: uv run yamllint -f github **/*.yaml
