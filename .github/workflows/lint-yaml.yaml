---
name: Lint YAML
permissions:
  contents: read

"on":
  push:
    branches:
      - "main"
    paths:
      - "**/*.yaml"
  pull_request:
    paths:
      - "**/*.yaml"
  workflow_dispatch:

jobs:
  yaml-lint:
    name: YAML
    runs-on: ubuntu-latest
    container: python:3.14-slim@sha256:44dd04494ee8f3b538294360e7c4b3acb87c8268e4d0a4828a6500b1eff50061
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: "0.11.24"

      - name: Install the project
        run: uv sync --locked --all-extras --dev

      - name: Run yamllint
        run: uv run yamllint -f github **/*.yaml
