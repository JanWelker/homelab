---
name: Lint YAML
permissions:
  contents: read

"on":
  push:
    branches: ["main", "master"]
    paths:
      - "payload/**/*.yaml"
      - "payload/**/*.yml"
      - ".github/workflows/*.yaml"
      - ".github/workflows/*.yml"
  pull_request:
    paths:
      - "payload/**/*.yaml"
      - "payload/**/*.yml"
      - ".github/workflows/*.yaml"
      - ".github/workflows/*.yml"
  workflow_dispatch:

jobs:
  yaml-lint:
    name: YAML
    runs-on: arc-runner-set
    container: python:3.14-slim@sha256:fb83750094b46fd6b8adaa80f66e2302ecbe45d513f6cece637a841e1025b4ca
    steps:
      - name: Checkout
        # v6
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          version: "0.11.1"

      - name: Install the project
        run: uv sync --locked --all-extras --dev

      - name: Run yamllint
        # Lint all YAML files in the payload directory
        run: uv run yamllint -f github payload .github/workflows
