---
name: Lint YAML
permissions:
  contents: read

"on":
  push:
    branches:
      - "main"
    paths:
      - "**/*.yaml"
  pull_request:
    paths:
      - "**/*.yaml"
  workflow_dispatch:

jobs:
  yaml-lint:
    name: YAML
    runs-on: ubuntu-latest
    container: python:3.14-slim@sha256:d7a925f9eb9639a93e455b9f12c167569358818c0f62b51b88edbc8fcf34c421
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: "0.11.20"

      - name: Install the project
        run: uv sync --locked --all-extras --dev

      - name: Run yamllint
        run: uv run yamllint -f github **/*.yaml
