---
name: Renovate Config Validation

permissions:
  contents: read

"on":
  push:
    branches:
      - "main"
    paths:
      - "renovate.json"
      - ".github/workflows/renovate-validate.yaml"
  pull_request:
    paths:
      - "renovate.json"
      - ".github/workflows/renovate-validate.yaml"
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Validate Renovate Config
        run: npx --package renovate@latest renovate-config-validator
