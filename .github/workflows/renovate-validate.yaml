---
name: Renovate Config Validation

permissions:
  contents: read

"on":
  push:
    branches:
      - "main"
    paths:
      - "renovate.json"
      - ".github/workflows/renovate-validate.yml"
  pull_request:
    paths:
      - "renovate.json"
      - ".github/workflows/renovate-validate.yml"
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Validate Renovate Config
        run: npx --package renovate@latest renovate-config-validator
