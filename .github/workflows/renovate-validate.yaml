---
name: Renovate Config Validation

permissions:
  contents: read

"on":
  push:
    branches:
      - "main"
    paths:
      - "renovate.json"
      - ".github/workflows/renovate-validate.yaml"
  pull_request:
    paths:
      - "renovate.json"
      - ".github/workflows/renovate-validate.yaml"
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Validate Renovate Config
        run: npx --package renovate@latest renovate-config-validator
