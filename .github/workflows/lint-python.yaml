---
name: Lint Python
permissions:
  contents: read

"on":
  push:
    branches:
      - "main"
    paths:
      - "boot_server/*.py"
      - "pyproject.toml"
      - "uv.lock"
  pull_request:
    paths:
      - "boot_server/*.py"
      - "pyproject.toml"
      - "uv.lock"
  workflow_dispatch:

jobs:
  python-lint:
    name: Python
    runs-on: ubuntu-latest
    container: python:3.14-slim@sha256:c845af9399020c7e562969a13689e929074a10fd057acd1b1fad06a2fb068e97
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.18"

      - name: Install the project
        run: uv sync --locked --all-extras --dev

      - name: Run pylint
        run: uv run pylint boot_server/*.py
