---
name: Lint Python
permissions:
  contents: read

"on":
  push:
    branches:
      - "main"
    paths:
      - "boot_server/*.py"
      - "pyproject.toml"
      - "uv.lock"
  pull_request:
    paths:
      - "boot_server/*.py"
      - "pyproject.toml"
      - "uv.lock"
  workflow_dispatch:

jobs:
  python-lint:
    name: Python
    runs-on: ubuntu-latest
    container: python:3.14-slim@sha256:cea0e6040540fb2b965b6e7fb5ffa00871e632eef63719f0ea54bca189ce14a6
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Install uv
        uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0
        with:
          version: "0.11.31"

      - name: Install the project
        run: uv sync --locked --all-extras --dev

      - name: Run pylint
        run: uv run pylint boot_server/*.py
