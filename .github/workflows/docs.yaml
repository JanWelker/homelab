---
name: Build and Push Documentation

"on":
  push:
    branches:
      - main
    paths:
      - "payload/workloads/documentation/src/**"
      - ".github/workflows/docs.yaml"
      - ".github/workflows/reusable-docker-build.yml"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: janwelker/homelab-docs

jobs:
  build:
    uses: ./.github/workflows/reusable-docker-build.yml
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    with:
      image_name: janwelker/homelab-docs
      context: payload/workloads/documentation/src
      use_uv: true
      build_command: |
        uv python install
        uv sync --locked --all-extras --dev
        cd payload/workloads/documentation/src && uv run mkdocs build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Update Deployment Image Tag
        run: |
          # Get the short SHA
          SHA_TAG="sha-$(git rev-parse --short HEAD)"
          NEW_IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${SHA_TAG}"

          # Update the deployment.yaml file
          sed -i "s|image: .*|image: ${NEW_IMAGE}|" \
            payload/workloads/documentation/deployment.yaml

          # Configure Git
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

          # Commit and Push
          git add payload/workloads/documentation/deployment.yaml
          if git commit -m "chore: update documentation image to ${SHA_TAG}"; then
            git push
          else
            echo "No changes to commit"
          fi
