---
name: Build and Push Documentation

"on":
  push:
    branches:
      - main
    paths:
      - "payload/workloads/documentation/src/**"
      - ".github/workflows/docs.yaml"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: janwelker/homelab-docs

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7

      - name: Set up Python
        run: uv python install

      - name: Install the project
        run: uv sync --locked --all-extras --dev

      - name: Build MkDocs
        working-directory: payload/workloads/documentation/src
        run: uv run mkdocs build

      - name: Log in to the Container registry
        # v3
        uses: docker/login-action@292fe2d7ee5389e283d2c71e565819146798c2e2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@11079342065fb7d2c3b37cb799ab6ecc01ad1bb2
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short

      - name: Build and push Docker image
        uses: docker/build-push-action@de308676347136a77704e0f257298c8f1b30054f
        with:
          context: payload/workloads/documentation/src
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Update Deployment Image Tag
        run: |
          SHA_TAG="sha-$(git rev-parse --short HEAD)"
          NEW_IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${SHA_TAG}"

          # Update the deployment.yaml file
          sed -i "s|image: .*|image: ${NEW_IMAGE}|" \
            payload/workloads/documentation/deployment.yaml

          # Configure Git
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

          # Commit and Push
          git add payload/workloads/documentation/deployment.yaml
          git commit -m "chore: update documentation image to ${SHA_TAG}"
          git push
