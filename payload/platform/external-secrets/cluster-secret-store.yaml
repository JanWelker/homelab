---
# ServiceAccount used by ESO to authenticate against OpenBao via the
# Kubernetes auth method. The OpenBao role `external-secrets` (created
# during the manual setup, see docs/platform/openbao.md) must bind this
# SA to a policy granting `read` access on `kv/data/*`.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: external-secrets-vault
  namespace: external-secrets
---
# Allow the external-secrets-vault SA to mint short-lived tokens for
# itself (TokenRequest API). ESO uses this to fetch a fresh JWT to send
# to OpenBao's /v1/auth/kubernetes/login endpoint.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: external-secrets-vault-token-creator
rules:
  - apiGroups: [""]
    resources: ["serviceaccounts/token"]
    resourceNames: ["external-secrets-vault"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: external-secrets-vault-token-creator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: external-secrets-vault-token-creator
subjects:
  - kind: ServiceAccount
    name: external-secrets
    namespace: external-secrets
---
# Cluster-wide SecretStore pointing every namespace at OpenBao's KV v2
# engine mounted at `kv/`. ExternalSecret resources reference this store
# by name via `spec.secretStoreRef.kind: ClusterSecretStore`.
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: openbao
spec:
  provider:
    vault:
      # OpenBao implements the HashiCorp Vault HTTP API verbatim, so the
      # `vault` provider works unchanged. We talk to the internal cluster
      # Service to avoid leaving the cluster network.
      server: "http://openbao.openbao.svc.cluster.local:8200"
      path: "kv"
      version: "v2"
      auth:
        kubernetes:
          mountPath: "kubernetes"
          role: "external-secrets"
          serviceAccountRef:
            name: external-secrets-vault
            namespace: external-secrets
