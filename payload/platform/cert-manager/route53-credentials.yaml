---
# Route53 credentials for cert-manager DNS-01 solver.
#
# The underlying access-key-id / secret-access-key live in OpenBao at:
#
#   kv/cert-manager/route53
#
# Store them with:
#
#   bao kv put kv/cert-manager/route53 \
#     access-key-id="$AWS_ACCESS_KEY_ID" \
#     secret-access-key="$AWS_SECRET_ACCESS_KEY"
#
# ESO renders them into a Kubernetes Secret named `route53-credentials`
# that the ClusterIssuers reference. See docs/platform/openbao.md.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: route53-credentials
  namespace: cert-manager
  annotations:
    # The external-secrets CRDs are installed by the `external-secrets`
    # Application (sync-wave 1), which runs after cert-manager (-5).
    # Skip dry-run so ArgoCD does not fail the initial sync — it will
    # retry once the CRD becomes available.
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: route53-credentials
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: access-key-id
      remoteRef:
        key: cert-manager/route53
        property: access-key-id
    - secretKey: secret-access-key
      remoteRef:
        key: cert-manager/route53
        property: secret-access-key
